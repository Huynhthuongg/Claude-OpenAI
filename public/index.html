<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Sandbox - Claude & OpenAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .chat-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 300px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input, select {
            padding: 12px 16px;
            border: 2px solid #e1e4e8;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            border-color: #667eea;
        }
        
        input {
            flex: 1;
        }
        
        select {
            min-width: 120px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: #e3f2fd;
            margin-left: 20%;
        }
        
        .bot-message {
            background: #f1f3f4;
            margin-right: 20%;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
        }
        
        .feature h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AI Agent Sandbox</h1>
        <p class="subtitle">Powered by Claude & OpenAI</p>
        
        <div class="chat-container" id="chat">
            <p style="color: #999; text-align: center;">Start a conversation with the AI...</p>
        </div>
        
        <div class="input-group">
            <input type="text" id="input" placeholder="Type your message here..." />
            <select id="model">
                <option value="openai">OpenAI</option>
                <option value="claude">Claude</option>
                <option value="local">Local</option>
            </select>
            <button onclick="sendMessage()">Send</button>
        </div>
        
        <div class="features">
            <div class="feature">
                <h3>Multi-Model</h3>
                <p>Support for OpenAI, Claude, and local LLMs</p>
            </div>
            <div class="feature">
                <h3>Embeddings</h3>
                <p>Long-term memory with vector storage</p>
            </div>
            <div class="feature">
                <h3>Skills</h3>
                <p>Extensible skill registry system</p>
            </div>
            <div class="feature">
                <h3>Tools</h3>
                <p>HTTP executors and external integrations</p>
            </div>
        </div>
    </div>

    <!-- Vercel Speed Insights -->
    <script defer src="/_vercel/speed-insights/script.js"></script>

    <script>
        const chatContainer = document.getElementById('chat');
        const input = document.getElementById('input');
        const modelSelect = document.getElementById('model');
        
        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;
            
            const model = modelSelect.value;
            
            // Add user message
            addMessage(message, 'user');
            input.value = '';
            
            // Show loading
            const loadingId = addMessage('<span class="loading"></span>', 'bot');
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ input: message, model }),
                });
                
                const data = await response.json();
                
                // Remove loading and add response
                document.getElementById(loadingId).remove();
                addMessage(data.output, 'bot');
            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessage('Error: ' + error.message, 'bot');
            }
        }
        
        function addMessage(text, type) {
            const messageId = 'msg-' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.id = messageId;
            messageDiv.className = 'message ' + (type === 'user' ? 'user-message' : 'bot-message');
            messageDiv.innerHTML = text;
            
            // Clear initial message if exists
            if (chatContainer.children.length === 1 && chatContainer.children[0].tagName === 'P') {
                chatContainer.innerHTML = '';
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return messageId;
        }
        
        // Allow Enter key to send message
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
